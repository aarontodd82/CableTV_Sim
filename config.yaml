# CableTV Simulator Configuration

schedule:
  # Reference point for schedule calculation (all schedules calculated from this)
  epoch: "2024-01-01T00:00:00"
  # Duration of each time slot in minutes
  slot_duration: 30
  # Random seed for deterministic scheduling (same seed = same schedule)
  seed: 42

