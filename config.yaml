ingest:
  # API keys are loaded from .env file or environment variables
  # TMDB: set TMDB_API_KEY in .env (get one at https://www.themoviedb.org/settings/api)
  tmdb_api_key: ""
  # Anthropic: set ANTHROPIC_API_KEY in .env (get one at https://console.anthropic.com/settings/keys)
  anthropic_api_key: ""
  # Transcode output resolution (4:3 aspect ratio for CRT)
  transcode_width: 640
  transcode_height: 480
  # Bitrate settings
  video_bitrate: "750k"
  transcode_threshold: "1100k"  # Skip transcode if source is below this
  audio_bitrate: "128k"
  # Keyframe interval for fast seeking (every N frames)
  keyframe_interval: 30
  # Crop percentage for widescreen (16:9) content on 4:3 display
  # 0 = full letterbox (black bars top/bottom), 12 = moderate crop (smaller bars),
  # 25 = full crop to 4:3 (no bars, loses ~25% of sides)
  widescreen_crop: 7

playback:
  # mpv IPC port for control
  mpv_ipc_port: 9876
  # How long to show channel OSD when switching (seconds)
  osd_duration: 2.0
  # Default channel on startup
  default_channel: 3
  # Display index for fullscreen (-1 = default, 0 = first, 1 = second, etc.)
  screen: 1
  # Overscan compensation for CRT (percentage margin on each edge, try 3-7)
  overscan: 2.5
  bumper_music: "L:\\CableTV_Sim\\music\\bumper.mp3"

web:
  # Web interface bind address (0.0.0.0 for all interfaces)
  host: "0.0.0.0"
  # Web interface port
  port: 5000
  # Enable debug mode (disable in production)
  debug: false

guide:
  # TV Guide channel (Prevue-style scrolling grid + promo clips)
  enabled: true
  channel_number: 14
  # Duration of each promo clip in seconds
  promo_duration: 20
  # Seconds per row scroll speed
  scroll_speed: 3.0
  # Duration of each generated segment in seconds
  segment_duration: 600
  # How often to regenerate segments (seconds)
  regenerate_interval: 600
  # Seconds into content to extract promo clip from
  promo_seek_offset: 300
  # Frames per second for guide video
  fps: 15
  # Path to background music file (MP3/WAV), empty for no music
  background_music: "L:\\CableTV_Sim\\music\\preview.mp3"

weather:
  # Weather Channel (90s-style cycling weather data pages)
  enabled: true
  channel_number: 26
  # Location coordinates (Lillington, NC)
  latitude: 35.3965
  longitude: -79.0028
  location_name: "Lillington, NC"
  # Duration of each generated segment in seconds
  segment_duration: 60
  # Duration of each weather page in seconds
  page_duration: 10
  # How often to refresh weather data from API (seconds)
  refresh_interval: 3600
  # Frames per second for weather video
  fps: 15
  # Enable RainViewer radar imagery
  radar_enabled: true
  # Path to smooth jazz background music (MP3/WAV), empty for no music
  background_music: "L:\\CableTV_Sim\\music\\weather.mp3"
